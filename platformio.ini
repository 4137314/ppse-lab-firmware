; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter, extra scripting
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[common]
build_flags = -Os -Dtimegm=mktime -DDEBUG=0
;debug_flags = -D RELEASE
lib_flags = -lc -lm
;monitor_port = /dev/ttyACM?


[env]
framework = arduino
board = pico

[env:pico]

platform = https://github.com/maxgerhardt/platform-raspberrypi.git@1.18.0
platform_packages = 
    platformio/toolchain-gccarmnoneeabi
    platformio/framework-arduino-mbed
    earlephilhower/tool-mklittlefs-rp2040-earlephilhower@^5.100300.230216


board = nanorp2040connect


; lib_flags = ${lib_flags}
build_flags = ${common.build_flags}


board_build.core=earlephilhower
; change microcontroller
board_build.mcu = rp2040

; change MCU frequency
board_build.f_cpu = 133000000L

; 
board_build.maximum_size = 2097152 ;2MBytes
; Filesystem size
board_build.filesystem_size = 65536 ; 64KBytes

upload_protocol = picotool



lib_deps =
    adafruit/Adafruit BusIO @ ^1.17.4
    adafruit/Adafruit GFX Library @ ^1.12.4
    adafruit/Adafruit SSD1306 @ ^2.5.16
    adafruit/Adafruit Neopixel @ ^1.15.2
    fastled/FastLED @ ^3.10.3
    rw0402/littlefs @ ^2.9.3