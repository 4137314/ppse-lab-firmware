name: "CI: Docs & Report Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] # Valida la compilazione prima del merge

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Doxygen & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # 1. Generazione Documentazione Tecnica (Doxygen)
      - name: Generate Doxygen
        run: doxygen Doxyfile

      # 2. Compilazione Report Accademico (LaTeX)
      - name: Compile Academic Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report/main.tex
          working_directory: report
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode"

      # 3. Assemblaggio Sito (Solo su push a main)
      - name: Prepare Site Structure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public/api
          
          # Copia la dashboard statica dalla tua codebase
          cp site/index.html public/
          
          # Sposta l'output Doxygen nella sottocartella /api
          cp -r docs/html/* public/api/
          
          # Copia il report compilato rinominandolo per il download
          cp report/main.pdf public/Academic_Report_PPSE.pdf

      # 4. Deploy su gh-pages (Solo su push a main)
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "docs: deploy integrated dashboard and reports [skip ci]"
