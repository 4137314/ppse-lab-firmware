name: "CI: Docs & Report Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Doxygen & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen
        run: doxygen Doxyfile

      - name: Compile Academic Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: report
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode"

      - name: Prepare Site Structure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public/api
          cp site/index.html public/
          cp -r docs/html/* public/api/
          cp report/main.pdf public/Academic_Report_PPSE.pdf

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "docs: deploy integrated dashboard and reports [skip ci]"
