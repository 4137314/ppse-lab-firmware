name: Docs Build Check

on:
  push:
    paths: [ 'doc/**', 'firm/src/**', 'Makefile' ]
  pull_request:
    branches: [ main ]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doc Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz texlive-full ghostscript

      - name: Build All Documentation
        run: make docs

      - name: Upload Preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: doc/.doc-build/
