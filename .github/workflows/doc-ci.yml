name: Docs Build Check

on:
  push:
    paths: [ 'doc/**', 'firm/src/**', 'Makefile', 'bibliography/**' ]
  pull_request:
    branches: [ main ]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen API
        run: make api-build # Usa il tuo target del Makefile

      - name: Compile Academic Report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: doc/report # Percorso aggiornato
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode"

      - name: Upload Doc Preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: |
            doc/report/main.pdf
            doc/api/Technical_Reference.pdf
          retention-days: 1
