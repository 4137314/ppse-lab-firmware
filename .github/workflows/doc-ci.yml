name: Docs Build Check

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen & Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen Source
        run: |
          # Creiamo la directory di build se non esiste
          mkdir -p doc/api/.api-build
          # Generiamo i sorgenti (Doxyfile deve puntare a generare LaTeX in .api-build/latex)
          doxygen doc/api/src/Doxyfile

      - name: Build Technical Reference (API) PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: refman.tex
          working_directory: doc/api/.api-build/latex
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode"

      - name: Build Academic Report PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: doc/report
          args: "-pdf -file-line-error -halt-on-error -interaction=nonstopmode"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: |
            doc/report/main.pdf
            doc/api/.api-build/latex/refman.pdf
          retention-days: 1
