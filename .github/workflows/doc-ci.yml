name: Docs Build Check

on:
  push:
    paths: [ 'doc/**', 'firm/src/**', 'Makefile', 'bibliography/**' ]
  pull_request:
    branches: [ main ]

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Full Doc Stack
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ghostscript \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-lang-italian texlive-bibtex-extra biber \
            latexmk

      - name: Build All Documentation
        # Usiamo il fix del nonstopmode che abbiamo discusso
        run: make docs

      - name: Check Artifacts
        run: |
          ls -lh doc/report/main.pdf
          ls -lh doc/api/Technical_Reference.pdf || echo "API PDF missing but proceeding"

      - name: Upload Doc Preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: |
            doc/report/main.pdf
            doc/api/Technical_Reference.pdf
          retention-days: 1
