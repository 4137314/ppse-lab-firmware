name: Firmware CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          # Installiamo clang-format-18 e cppcheck
          sudo apt-get install -y cppcheck clang-format-18
          
          # Sovrascriviamo il comando standard con la versione 18
          sudo ln -sf /usr/bin/clang-format-18 /usr/bin/clang-format
          
          # Verifica versione (utile per il debug nei log)
          clang-format --version
          
          pip install platformio

      - name: Build Firmware
        run: make build

      - name: Quality Check
        run: make check
