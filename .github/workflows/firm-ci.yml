name: Firmware Build Check

on:
  push:
    branches: [ '**' ]
    paths: [ 'firm/**', 'Makefile' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            firm/.firm-build/libdeps
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio
          sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run Quality Check (Lint)
        run: make fw-lint

      - name: Compile Firmware
        run: make build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries-${{ github.sha }}
          path: |
            firm/.firm-build/build/pico/firmware.bin
            firm/.firm-build/build/pico/firmware.uf2
          retention-days: 7
