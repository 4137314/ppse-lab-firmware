name: Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

# Permessi necessari per scrivere release e pubblicare su GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    
    # Specifica l'ambiente richiesto da GitHub Pages per autorizzare il deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install All Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz zip latexmk cppcheck \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-science texlive-lang-italian
          pip install clang-format==18.1.1
          pip install platformio

      - name: Run Orchestrator Build
        run: |
          # Eseguiamo i target uno alla volta saltando 'make check' per evitare errori di linting
          make info
          make clean
          make build
          make docs
          
          echo "[CI] Assembling Distribution Bundle..."
          mkdir -p .release/downloads
          
          # Copia i documenti generati dal portale web (solitamente in .doc-build)
          cp -r .doc-build/* .release/ 2>/dev/null || true
          
          # Copia e rinomina i binari per la release
          if [ -f firm/.firm-build/build/pico/firmware.uf2 ]; then
            cp firm/.firm-build/build/pico/firmware.uf2 .release/downloads/ppse-firmware_latest.uf2
            cp firm/.firm-build/build/pico/firmware.bin .release/downloads/ppse-firmware_latest.bin
            cp firm/.firm-build/build/pico/firmware.elf .release/downloads/ppse-firmware_latest.elf
            cd .release/downloads && zip -q ppse-firmware_bundle.zip *
            echo "✅ Release staged successfully"
          else
            echo "❌ Build artifacts not found in firm/.firm-build/build/pico/" && exit 1
          fi

      - name: Upload to Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .release/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
