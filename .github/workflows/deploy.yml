name: Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install All Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz zip latexmk cppcheck \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-science texlive-lang-italian
          pip install clang-format==18.1.1
          pip install platformio

      - name: Run Orchestrator Release
        run: |
          # Eseguiamo i target uno per uno saltando 'check'
          make info
          make clean
          make build
          make docs
          
          echo "[CI] Assembling Distribution Bundle..."
          mkdir -p .release/downloads
          
          # Copia i documenti generati
          cp -r .doc-build/* .release/ 2>/dev/null || true
          
          # Copia i binari
          if [ -f firm/.firm-build/build/pico/firmware.uf2 ]; then
            cp firm/.firm-build/build/pico/firmware.uf2 .release/downloads/ppse-firmware_latest.uf2
            cp firm/.firm-build/build/pico/firmware.bin .release/downloads/ppse-firmware_latest.bin
            cp firm/.firm-build/build/pico/firmware.elf .release/downloads/ppse-firmware_latest.elf
            cd .release/downloads && zip -q ppse-firmware_bundle.zip *
            echo "✅ Release staged successfully"
          else
            echo "❌ Build artifacts not found!" && exit 1
          fi

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .release/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
