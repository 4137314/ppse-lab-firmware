name: "CI/CD: Full Deployment"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fondamentale per git describe nel Makefile

      - name: Cache PlatformIO & LaTeX
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            /var/cache/apt/archives
          key: ${{ runner.os }}-deploy-v1-${{ hashFiles('**/platformio.ini') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz zip latexmk \
            texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended \
            texlive-lang-italian cppcheck
          pip install platformio

      - name: Execute Unified Release
        # Questo comando fa: clean -> check -> build -> docs -> assembla .release/
        run: make release

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .release/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .release/downloads/*.zip
            .release/downloads/*.uf2
            .release/downloads/*.bin
            .release/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
