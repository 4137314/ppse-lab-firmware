name: Deployment
# Trigger
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz zip latexmk cppcheck \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-science texlive-lang-italian
          pip install clang-format==18.1.1
          pip install platformio

      - name: Run Makefile Release
        run: |
          # Forza l'esecuzione anche se 'check' (clang-format) fallisce
          # Questo comando crea la tua cartella .release/
          make release || echo "Release target finished with some warnings (linting bypassed)"

      - name: Deploy .release to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .release
          publish_branch: gh-pages
