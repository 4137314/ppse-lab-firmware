name: Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write  # FONDAMENTALE per permettere il push su gh-pages

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install All Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz zip latexmk cppcheck \
            texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-fonts-extra \
            texlive-science texlive-lang-italian
          pip install clang-format==18.1.1
          pip install platformio

      - name: Build Release
        run: |
          # Usiamo i tuoi target che funzionano
          make info
          make clean
          make build
          make docs
          # Qui il tuo Makefile dovrebbe aver popolato la cartella di release
          # Se il tuo Makefile non fa il push automatico, lo facciamo noi qui:

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .release  # Assicurati che sia la cartella creata dal tuo Makefile
          force_orphan: true     # Crea un branch pulito ogni volta
