name: Firmware Build Check

on:
  # Attiva la build su ogni push in QUALSIASI branch
  push:
    branches:
      - '**'
  # Attiva la build per ogni Pull Request verso il main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # --- SUB-ISSUE 3: CACHE ---
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    # --- SUB-ISSUE 1: REFACTORING BUILD ---
    - name: Run Build via Makefile
      run: make build
