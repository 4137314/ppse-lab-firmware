name: Firmware Build Check

on:
  # Attiva la build su ogni push in QUALSIASI branch (massima visibilità per il team)
  push:
    branches:
      - '**'
  # Attiva la build per ogni Pull Request verso il main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # --- ISSUE: CACHE DELLE DIPENDENZE PLATFORMIO (OTTIMIZZATA) ---
    # Memorizza compilatori, framework e librerie per abbattere i tempi di build
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
          ~/.platformio/packages
          ~/.platformio/platforms
          .pio/libdeps
        # La chiave cambia solo se modifichi il file di configurazione platformio.ini
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        # Se la chiave non coincide, recupera comunque l'ultima cache disponibile
        restore-keys: |
          ${{ runner.os }}-pio-

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    # --- SUB-ISSUE 1: REFACTORING BUILD ---
    # Utilizza l'astrazione del Makefile per garantire coerenza tra locale e CI
    - name: Run Build via Makefile
      run: make build
# TEST TO ACTIVATE & TEST THE CACHE OF THE CI/CD
