name: Firmware Build Check

on:
  # Attiva la build su ogni push in QUALSIASI branch
  push:
    branches:
      - '**'
  # Attiva la build per ogni Pull Request verso il main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # --- CACHE DELLE DIPENDENZE PLATFORMIO ---
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
          ~/.platformio/packages
          ~/.platformio/platforms
          .pio/libdeps
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-

    # --- INSTALLAZIONE DIPENDENZE ---
    - name: Install PlatformIO and Linter
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio
        sudo apt-get update && sudo apt-get install -y cppcheck

    # --- VALIDAZIONE STATICA (LINTING) ---
    - name: Run Static Analysis (Lint)
      run: make lint

    # --- COMPILAZIONE ---
    - name: Run Build via Makefile
      run: make build

        # --- ARTIFACT UPLOAD ---
    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      with:
        # Usiamo 'run_id' che è un numero puro, evitando ogni conflitto di nomi
        name: firmware-build-id-${{ github.run_id }}
        path: |
          .pio/build/**/firmware.bin
          .pio/build/**/firmware.elf
          .pio/build/**/firmware.uf2
        retention-days: 7
